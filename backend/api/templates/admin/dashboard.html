{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block extrastyle %}
<style>
  .dashboard-wrap {
    padding: 20px 24px;
    max-width: 1200px;
  }

  /* 统计卡片 */
  .stat-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 30px;
  }
  .stat-card {
    background: #fff;
    border-radius: 10px;
    padding: 24px 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 20px;
    transition: transform 0.2s;
  }
  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .stat-icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .stat-icon.spots   { background: linear-gradient(135deg, #a8d8ea, #7ec8e3); }
  .stat-icon.users   { background: linear-gradient(135deg, #f6c1c1, #f2a7a7); }
  .stat-icon.diaries { background: linear-gradient(135deg, #b5e8c3, #8dd7a3); }
  .stat-num {
    font-size: 32px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
  }
  .stat-label {
    font-size: 14px;
    color: #909399;
    margin-top: 4px;
  }

  /* 图表区域 */
  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .chart-card {
    background: #fff;
    border-radius: 10px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .chart-card h3 {
    margin: 0 0 20px;
    font-size: 16px;
    color: #303133;
  }
  .chart-card canvas {
    width: 100% !important;
  }

  @media (max-width: 900px) {
    .stat-cards { grid-template-columns: 1fr; }
    .chart-row  { grid-template-columns: 1fr; }
  }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-wrap">

  <!-- 统计卡片 -->
  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-icon spots">📍</div>
      <div>
        <div class="stat-num">{{ spot_count }}</div>
        <div class="stat-label">景点总数</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon users">👤</div>
      <div>
        <div class="stat-num">{{ user_count }}</div>
        <div class="stat-label">注册用户</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon diaries">📓</div>
      <div>
        <div class="stat-num">{{ diary_count }}</div>
        <div class="stat-label">旅行日记</div>
      </div>
    </div>
  </div>

  <!-- 图表 -->
  <div class="chart-row">
    <div class="chart-card">
      <h3>📊 各城市景点数量</h3>
      <canvas id="cityChart" height="260"></canvas>
    </div>
    <div class="chart-card">
      <h3>🏷️ 兴趣标签分布</h3>
      <canvas id="tagChart" height="260"></canvas>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
  // 城市景点数量 - 柱状图
  new Chart(document.getElementById('cityChart'), {
    type: 'bar',
    data: {
      labels: {{ city_labels|safe }},
      datasets: [{
        label: '景点数量',
        data: {{ city_counts|safe }},
        backgroundColor: [
          '#a8d8ea','#c3b1e1','#f6c1c1','#7ec8e3',
          '#b5e8c3','#ffe0a3','#f2a7a7','#d4e5f7'
        ],
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { stepSize: 2 }
        }
      }
    }
  });

  // 兴趣标签分布 - 饼图
  new Chart(document.getElementById('tagChart'), {
    type: 'doughnut',
    data: {
      labels: {{ tag_labels|safe }},
      datasets: [{
        data: {{ tag_counts|safe }},
        backgroundColor: [
          '#a8d8ea','#c3b1e1','#f6c1c1','#7ec8e3',
          '#b5e8c3','#ffe0a3','#f2a7a7','#d4e5f7'
        ],
        borderWidth: 2,
        borderColor: '#fff',
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: 'right',
          labels: { padding: 14, font: { size: 13 } }
        }
      }
    }
  });
</script>
{% endblock %}
